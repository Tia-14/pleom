<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <meta name="description" content="Pleom - Coming Soon" />
  <title>Pleom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@200;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: #ffffff;
      color: #101010;
      font-family: 'Work Sans', Helvetica, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      padding: 50px 40px;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .logo svg {
      width: 322px;
      height: auto;
    }

    /* ── Main content ── */
    main {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .coming-soon-text {
      font-family: 'Work Sans', Helvetica, sans-serif;
      font-weight: 400;
      color: #101010;
      font-size: 36px;
      text-align: center;
      letter-spacing: -0.05em;
      line-height: 110%;
      max-width: 120%;
      width: max-content;
      max-width: min(120%, 100vw - 80px);
    }

    /* ── Footer ── */
    footer {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .social-links {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .social-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .social-links a:hover {
      opacity: 0.7;
    }

    .social-links svg {
      width: 82px;
      height: 82px;
      display: block;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      body {
        padding: 40px 24px;
      }
      .logo svg {
        width: 200px;
      }
      .social-links svg {
        width: 56px;
        height: 56px;
      }
    }
  </style>
</head>
